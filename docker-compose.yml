services:

  app:
    build: .
    container_name: shortener_app
    ports:
      - "8088:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:16
    container_name: shortener_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5541:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shortener_redis
    ports:
      - "6385:6379"

volumes:
  postgres_data: