<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        <a href="/dashboard">My Links</a>
    </div>

    <div class="container">
        <div class="card">
            <h2>Dashboard</h2>
            <p id="auth-status">Checking auth status...</p>
            <p>Token is stored in localStorage and used for protected endpoints.</p>

            <button onclick="checkAuth()">Check token</button>
            <button onclick="showToken()">Show token</button>
            <button onclick="logout()">Logout</button>

            <pre id="token-box" style="text-align:left; white-space:pre-wrap; margin-top: 16px;"></pre>
        </div>
    </div>

    <script>
        function getToken() {
            return localStorage.getItem("token");
        }

        function authHeaders() {
            const token = getToken();
            return token ? { "Authorization": `Bearer ${token}` } : {};
        }

        function showToken() {
            const token = getToken();
            document.getElementById("token-box").innerText = token || "No token found";
        }

        async function checkAuth() {
            const statusEl = document.getElementById("auth-status");
            const token = getToken();

            if (!token) {
                statusEl.innerText = "Not authenticated: token not found.";
                return;
            }

            const response = await fetch("/projects", {
                method: "GET",
                headers: authHeaders()
            });

            if (response.ok) {
                statusEl.innerText = "Authenticated: token is valid.";
            } else {
                const data = await response.json();
                statusEl.innerText = `Token rejected: ${data.detail || response.status}`;
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/login";
        }

        checkAuth();
    </script>
</body>
</html>
